<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>setdot</title>
  <link href="homepage.css" rel="stylesheet" type="text/css">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      padding-top: 240px; /* offset for logo + fixed navbar */
      padding-bottom: 60px; /* space for fixed footer */
    }

    main {
      flex-grow: 1;
    }

    /* Navbar below logo */
    .fixed-navbar {
      margin-top: 140px;
    }

    .navbar {
      padding-top: 0.2rem;
      padding-bottom: 0.2rem;
      font-size: 0.9rem;
    }

    .navbar-nav .nav-item .nav-link {
      padding-top: 0.3rem;
      padding-bottom: 0.3rem;
    }

    /* Contact styling */
    .contact {
      padding: 1rem;
    }

    .contact p, .contact a {
      margin: 0.25rem 0;
    }

    /* Form styling */
    form {
      padding: 1rem;
      background-color: #f8f9fa;
      border-radius: 8px;
      max-width: 600px;
      margin: auto;
    }

    fieldset {
      border: none;
    }

    textarea, input, select {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.3rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button[type="submit"] {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background-color: #0056b3;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: #f8f9fa;
      padding: 1rem 0;
      text-align: center;
      z-index: 1000;
    }

    footer ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    footer ul li {
      display: inline;
      margin: 0 10px;
    }

    footer ul li a {
      text-decoration: none;
      color: #000;
    }

    footer ul li a:hover {
      color: #007bff;
    }
  </style>
</head>

<body>

  <!-- Logo -->
  <div class="logo text-center">
    <header>
      <img src="Artboard 1.png" alt="placeholder" class="pfooter" width="90%">
    </header>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top fixed-navbar">
    <div class="container-fluid">
      <a class="navbar-brand" href="homeAI.html">setdot</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="homeAI.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="portraitAI.html">Portrait</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="landscapeAI.html">Landscape</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="randomAI.html">Random</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex">
    <article>
      <div class="contact text-center">
        <h1>Contact</h1>
        <p><strong>setdot Photography</strong></p>
        <p><strong>Studio:</strong> 9024 Cirda Cr</p>
        <p>Columbus, OH 43228, USA</p>
        <p><strong>Email:</strong> <a href="mailto:ennodjo@gmail.com">ennodjo@gmail.com</a></p>
        <p><strong>Tel.:</strong> <a href="tel:(xxx) xxx-xxxx">(xxx) xxx-xxxx</a></p>
      </div>

      <form>
        <fieldset>
          <legend>Please provide your feedback</legend>

          <label for="Firstname">Firstname:</label>
          <input type="text" id="Firstname" name="Firstname" required>

          <label for="Lastname">Lastname:</label>
          <input type="text" id="Lastname" name="Lastname" required>

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>

          <label for="Satisfaction">Satisfaction Level</label>
          <select id="Satisfaction" name="satisfaction">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>

          <label for="feedback">Leave a comment:</label>
          <textarea id="feedback" name="feedback" cols="33" rows="5"></textarea>

          <button type="submit">Submit</button>
        </fieldset>
      </form>
    </article>
  </main>

  <!-- Footer -->
  <footer id="footer-nav">
    <ul>
      <li><a href="mailto:ennodjo@gmail.com">Request</a></li>
      <li><a href="contactAI.html">Contact</a></li>
      <li><a href="https://www.instagram.com/jonathanseth_/?igsh=MTBmaDZ3MGRhYW53dw%3D%3D&utm_source=qr">See More</a></li>
    </ul>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
