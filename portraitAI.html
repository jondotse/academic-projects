<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>setdot</title>
  <link href="homepage.css" rel="stylesheet" type="text/css">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Ensure page takes full height */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      padding-bottom: 60px; /* space for footer */
    }

    main {
      flex-grow: 1;
    }

    /* Navbar fixes */
    .fixed-navbar {
      margin-top: 140px; /* Push below logo */
    }

    .navbar {
      padding-top: 0.2rem;
      padding-bottom: 0.2rem;
      font-size: 0.85rem;
    }

    .navbar-nav .nav-item .nav-link {
      padding-top: 0.3rem;
      padding-bottom: 0.3rem;
    }

    /* Fixed footer styles */
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: #f8f9fa;
      padding: 1rem 0;
      text-align: center;
      z-index: 1000;
    }

    footer ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    footer ul li {
      display: inline;
      margin: 0 10px;
    }

    footer ul li a {
      text-decoration: none;
      color: #000;
    }

    footer ul li a:hover {
      color: #007bff;
    }

    /* Portrait image grid (assumes homepage.css handles this too) */
    .gridcontainer {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      padding: 1rem;
    }

    .cportrait {
      width: 100%;
      height: auto;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <!-- Logo at top -->
  <div class="logo text-center">
    <header>
      <img src="Artboard2.png" alt="placeholder" class="pfooter" width="90%">
    </header>
  </div>

  <!-- Bootstrap Navbar fixed below logo -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top fixed-navbar">
    <div class="container-fluid">
      <a class="navbar-brand" href="homeAI.html">setdot</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="homeAI.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="portraitAI.html">Portrait</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="landscapeAI.html">Landscape</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="randomAI.html">Random</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex">
    <article class="gridcontainer">
      <img src="IMG_2516.jpg" alt="Youngman standing" class="cportrait">
      <img src="IMG_2521.JPG" alt="boy's portrait in the snow" class="cportrait">
      <img src="IMG_2522.JPG" alt="profile left" class="cportrait">
      <img src="IMG_2526.JPG" alt="profile right" class="cportrait">
      <img src="DSC_1919.JPG" alt="Youngman with a phone" class="cportrait">
    </article>
  </main>

  <!-- Footer Fixed at Bottom -->
  <footer id="footer-nav">
    <ul>
      <li><a href="mailto:ennodjo@gmail.com">Request</a></li>
      <li><a href="contactAI.html">Contact</a></li>
      <li><a href="https://www.instagram.com/jonathanseth_/?igsh=MTBmaDZ3MGRhYW53dw%3D%3D&utm_source=qr">See More</a></li>
    </ul>
  </footer>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
